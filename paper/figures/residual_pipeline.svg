<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Fixed-identity abnormal-action residual pipeline</title>
  <desc id="desc">The contemporaneous market state feeds both a normal-action model and a raw future-price model. The observed action minus expected action forms a residual. The raw model fixes bookmaker and outcome identity, while the residual model reranks the same candidate. Future same-book closing price is the mechanism target. Realized return and execution are evaluated in separate downstream layers.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; }
      .accent { fill: #e0f2fe; stroke: #0369a1; stroke-width: 2; rx: 14; }
      .target { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 14; }
      .warning { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 14; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="600" y="38" text-anchor="middle" class="title">Fixed-identity abnormal-action residual design</text>

  <rect x="40" y="100" width="220" height="105" class="box"/>
  <text x="150" y="137" text-anchor="middle" class="label">Market state</text>
  <text x="150" y="166" text-anchor="middle" class="small">own prices, consensus,</text>
  <text x="150" y="189" text-anchor="middle" class="small">peer coverage, timing</text>

  <rect x="340" y="70" width="235" height="105" class="accent"/>
  <text x="458" y="107" text-anchor="middle" class="label">Normal-action model</text>
  <text x="458" y="136" text-anchor="middle" class="small">expected hazard and</text>
  <text x="458" y="159" text-anchor="middle" class="small">conditional H/D/A move</text>

  <rect x="340" y="225" width="235" height="105" class="box"/>
  <text x="458" y="262" text-anchor="middle" class="label">Observed action</text>
  <text x="458" y="291" text-anchor="middle" class="small">realized next quote</text>
  <text x="458" y="314" text-anchor="middle" class="small">change before target</text>

  <rect x="650" y="125" width="240" height="115" class="accent"/>
  <text x="770" y="162" text-anchor="middle" class="label">Action residual</text>
  <text x="770" y="191" text-anchor="middle" class="small">observed minus expected</text>
  <text x="770" y="214" text-anchor="middle" class="small">match-specific surprise</text>

  <rect x="340" y="385" width="235" height="95" class="box"/>
  <text x="458" y="420" text-anchor="middle" class="label">Raw candidate model</text>
  <text x="458" y="449" text-anchor="middle" class="small">fix bookmaker + outcome</text>

  <rect x="650" y="350" width="240" height="130" class="accent"/>
  <text x="770" y="386" text-anchor="middle" class="label">Residual reranker</text>
  <text x="770" y="415" text-anchor="middle" class="small">same fixed identity</text>
  <text x="770" y="438" text-anchor="middle" class="small">raw score + residual uplift</text>
  <text x="770" y="461" text-anchor="middle" class="small">exact matched capacity</text>

  <rect x="960" y="105" width="205" height="115" class="target"/>
  <text x="1062" y="142" text-anchor="middle" class="label">Mechanism target</text>
  <text x="1062" y="171" text-anchor="middle" class="small">future same-book</text>
  <text x="1062" y="194" text-anchor="middle" class="small">closing-price quality</text>

  <rect x="960" y="330" width="205" height="145" class="warning"/>
  <text x="1062" y="366" text-anchor="middle" class="label">Separate conversion</text>
  <text x="1062" y="395" text-anchor="middle" class="small">realized outcome return</text>
  <text x="1062" y="418" text-anchor="middle" class="small">latency, fill, slippage</text>
  <text x="1062" y="441" text-anchor="middle" class="small">limits and account capacity</text>

  <path d="M260 133 L340 115" class="arrow"/>
  <path d="M260 170 L340 263" class="arrow"/>
  <path d="M575 121 L650 165" class="arrow"/>
  <path d="M575 278 L650 204" class="arrow"/>
  <path d="M260 190 C300 260,300 390,340 423" class="arrow"/>
  <path d="M575 432 L650 432" class="arrow"/>
  <path d="M770 240 L770 350" class="arrow"/>
  <path d="M890 177 L960 163" class="arrow"/>
  <path d="M890 415 L960 402" class="dash"/>
  <path d="M1062 220 L1062 330" class="dash"/>

  <text x="905" y="277" text-anchor="middle" class="small">primary evidence</text>
  <text x="920" y="455" text-anchor="end" class="small">downstream only</text>
</svg>
