name: Beat Original SQL Probe

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/probe_beat_original_sql_sources.py"
      - ".github/workflows/beat-original-sql-probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e .
      - run: python scripts/probe_beat_original_sql_sources.py
      - uses: actions/upload-artifact@v4
        with:
          name: beat-original-sql-probe
          path: artifacts/beat-original-sql-probe/probe_report.json
          if-no-files-found: error
