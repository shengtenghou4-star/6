name: Experiment 002 Move Hazard

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_002_move_hazard.py"
      - "docs/EXPERIMENT_002_PROTOCOL.md"
      - ".github/workflows/experiment-002-move-hazard.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen Experiment 002
        run: >-
          python scripts/experiment_002_move_hazard.py
          --output-root artifacts/experiment-002
          --chunksize 128
          --nonlinear-max-train 500000
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-002-move-hazard
          path: artifacts/experiment-002/result.json
          if-no-files-found: warn
