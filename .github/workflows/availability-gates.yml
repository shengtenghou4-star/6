name: Availability Gates

on:
  pull_request:
    paths:
      - "src/marketlab/availability.py"
      - "tests/test_availability.py"
      - ".github/workflows/availability-gates.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest tests/test_availability.py -vv
