name: Availability Gates

on:
  pull_request:
    paths:
      - "src/marketlab/availability.py"
      - "tests/test_availability.py"
      - ".github/workflows/availability-gates.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Run focused tests
        shell: bash
        run: |
          mkdir -p artifacts
          set +e
          pytest tests/test_availability.py -vv > artifacts/availability-test.txt 2>&1
          code=$?
          cat artifacts/availability-test.txt
          exit $code
      - name: Upload focused test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: availability-test-output
          path: artifacts/availability-test.txt
          if-no-files-found: error
