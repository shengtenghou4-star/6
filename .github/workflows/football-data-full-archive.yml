name: Football-Data Full Archive

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/backfill_football_data_full_archive.py"
      - ".github/workflows/football-data-full-archive.yml"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Backfill full seasonal archive
        run: python scripts/backfill_football_data_full_archive.py --output-root artifacts/football-data-full-archive --min-rows 100000
      - name: Upload full archive evidence
        uses: actions/upload-artifact@v4
        with:
          name: football-data-full-archive
          path: artifacts/football-data-full-archive
          if-no-files-found: error
