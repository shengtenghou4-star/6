name: Prospective Campaign Live Check

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/prospective-campaign-live-check.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: prospective-campaign-live-check
  cancel-in-progress: false

env:
  MODEL_ARTIFACT_ID: "8435876486"
  MODEL_ARTIFACT_SHA256: "53c5218fc3a0e20edcfcb7002ee08d76348e8115e590082b824cc0a16a209a37"
  MATCHED_SHADOW_ACTIVATION_UTC: "2026-07-19T07:00:00Z"

jobs:
  live-check:
    if: github.head_ref == 'campaign-live-check'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Validate secret
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          test -n "$THE_ODDS_API_KEY" || { echo "THE_ODDS_API_KEY missing" >&2; exit 1; }
      - name: Check out persistent data branch
        uses: actions/checkout@v4
        with:
          ref: prospective-data
          path: prospective-data
          fetch-depth: 1
      - name: Collect bounded live snapshots
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          python scripts/run_budgeted_prospective_campaign.py \
            --output-root artifacts/campaign-run \
            --max-sports 2 \
            --horizon-hours 60 \
            --region uk \
            --max-run-credits 2
      - name: Persist immutable raw evidence
        shell: bash
        run: |
          set -euo pipefail
          raw_root="prospective-data/data/prospective-odds"
          run_root="prospective-data/data/campaign-runs/${GITHUB_RUN_ID}"
          mkdir -p "$raw_root" "$run_root"
          if compgen -G "artifacts/campaign-run/snapshots/*" > /dev/null; then
            for snapshot in artifacts/campaign-run/snapshots/*; do
              target="$raw_root/$(basename "$snapshot")"
              test ! -e "$target" || { echo "duplicate snapshot $target" >&2; exit 1; }
              cp -a "$snapshot" "$target"
            done
          fi
          cp -a artifacts/campaign-run/manifest.json "$run_root/"
          cp -a artifacts/campaign-run/event-scouting "$run_root/"
          cp -a artifacts/campaign-run/audits "$run_root/"
      - name: Build accumulated sequence
        run: |
          python scripts/build_prospective_sequence_ledger.py \
            --snapshots-root prospective-data/data/prospective-odds \
            --output-root artifacts/prospective-sequence \
            --market h2h \
            --minimum-other-books 3 \
            --allow-insufficient-overlap
      - name: Score action-residual shadow when ready
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          status=$(python -c 'import json; print(json.load(open("artifacts/prospective-sequence/manifest.json"))["status"])')
          mkdir -p artifacts/prospective-shadow
          if [[ "$status" != "materialized" ]]; then
            python - <<'PY'
          import json
          from pathlib import Path
          source=json.load(open("artifacts/prospective-sequence/manifest.json"))
          Path("artifacts/prospective-shadow/manifest.json").write_text(json.dumps({
            "schema_version":1,
            "status":"sequence_not_ready",
            "sequence_status":source["status"],
            "reason":source.get("reason"),
            "research_only":True,
            "no_execution":True
          }, indent=2, sort_keys=True), encoding="utf-8")
          PY
          else
            mkdir -p artifacts/generic-action-shadow
            gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${MODEL_ARTIFACT_ID}/zip" > artifacts/generic-action-shadow.zip
            echo "${MODEL_ARTIFACT_SHA256}  artifacts/generic-action-shadow.zip" | sha256sum -c -
            unzip -q artifacts/generic-action-shadow.zip -d artifacts/generic-action-shadow
            python scripts/score_prospective_action_shadow.py \
              --bundle-root artifacts/generic-action-shadow/bundle \
              --quote-ledger artifacts/prospective-sequence/quote-ledger.csv.gz \
              --transitions artifacts/prospective-sequence/consecutive-transitions.csv.gz \
              --output-root artifacts/prospective-shadow \
              --allow-no-supported-chains
          fi
      - name: Build matched-budget challenger
        run: |
          python scripts/build_matched_budget_shadow.py \
            --shadow-root artifacts/prospective-shadow \
            --output-root artifacts/matched-budget-shadow \
            --activation-utc "$MATCHED_SHADOW_ACTIVATION_UTC" \
            --fraction 0.05
      - name: Persist and commit live-check state
        shell: bash
        run: |
          set -euo pipefail
          run_root="prospective-data/data/campaign-runs/${GITHUB_RUN_ID}"
          latest_root="prospective-data/data/derived/latest"
          mkdir -p "$run_root" "$latest_root"
          rm -rf "$latest_root/sequence" "$latest_root/shadow" "$latest_root/matched-budget-shadow"
          cp -a artifacts/prospective-sequence "$latest_root/sequence"
          cp -a artifacts/prospective-shadow "$latest_root/shadow"
          cp -a artifacts/matched-budget-shadow "$latest_root/matched-budget-shadow"
          cp -a artifacts/prospective-sequence/manifest.json "$run_root/sequence-manifest.json"
          cp -a artifacts/prospective-shadow/manifest.json "$run_root/shadow-manifest.json"
          cp -a artifacts/matched-budget-shadow/manifest.json "$run_root/matched-budget-shadow-manifest.json"
          cd prospective-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Prospective campaign live check ${GITHUB_RUN_ID}"
          git push origin HEAD:prospective-data
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prospective-campaign-live-check-${{ github.run_id }}
          path: |
            artifacts/campaign-run/
            artifacts/prospective-sequence/
            artifacts/prospective-shadow/
            artifacts/matched-budget-shadow/
          retention-days: 90
          if-no-files-found: warn

# Live-check revision 2: provider query bounds use whole-second UTC timestamps.
