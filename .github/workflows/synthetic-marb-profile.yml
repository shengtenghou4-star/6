name: Synthetic MARB Profile

on:
  pull_request:
    paths:
      - "scripts/run_synthetic_marb_profile.py"
      - "scripts/validate_benchmark_submission.py"
      - "tests/test_synthetic_marb_profile.py"
      - "benchmark/SYNTHETIC_PROFILE.md"
      - "benchmark/submission.schema.json"
      - ".github/workflows/synthetic-marb-profile.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/run_synthetic_marb_profile.py"
      - "scripts/validate_benchmark_submission.py"
      - "tests/test_synthetic_marb_profile.py"
      - "benchmark/SYNTHETIC_PROFILE.md"
      - "benchmark/submission.schema.json"
      - ".github/workflows/synthetic-marb-profile.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q tests/test_synthetic_marb_profile.py

      - name: Run frozen synthetic profile
        run: |
          python scripts/run_synthetic_marb_profile.py \
            --output-root artifacts/synthetic-marb-profile \
            --opportunities 12000 \
            --placebo-replicates 1000 \
            --bootstrap-replicates 1000 \
            --seed 20260719

      - name: Validate benchmark submission
        run: |
          python scripts/validate_benchmark_submission.py \
            artifacts/synthetic-marb-profile/submission.json \
            --output artifacts/synthetic-marb-profile/validation.json

      - name: Upload simulation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-marb-profile-${{ github.run_id }}
          path: artifacts/synthetic-marb-profile/
          retention-days: 90
          if-no-files-found: error

# This workflow validates benchmark mechanics under a known synthetic process.
# It creates no empirical cross-domain or profitability claim.
