name: Modern AH Time-Series Ingest

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/backfill_modern_ah_kaggle.py"
      - ".github/workflows/modern-ah-timeseries-ingest.yml"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e .
      - name: Acquire and profile public modern AH dataset
        run: python scripts/backfill_modern_ah_kaggle.py --output-root artifacts/modern-ah-timeseries
      - name: Upload compact evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: modern-ah-timeseries-evidence
          path: |
            artifacts/modern-ah-timeseries/manifest.json
            artifacts/modern-ah-timeseries/failure.json
          if-no-files-found: warn
