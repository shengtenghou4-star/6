name: Experiment 003 Conditional Movement

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_003_conditional_movement.py"
      - "docs/EXPERIMENT_003_PROTOCOL.md"
      - ".github/workflows/experiment-003-conditional-movement.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen Experiment 003
        run: >-
          python scripts/experiment_003_conditional_movement.py
          --output-root artifacts/experiment-003
          --chunksize 128
          --nonlinear-max-train 400000
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-003-conditional-movement
          path: artifacts/experiment-003/result.json
          if-no-files-found: warn
