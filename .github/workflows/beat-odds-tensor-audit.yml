name: Beat Odds Tensor Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/audit_beat_odds_tensor.py"
      - ".github/workflows/beat-odds-tensor-audit.yml"

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e . pandas numpy
      - name: Audit full 32x3x72 tensor
        run: python scripts/audit_beat_odds_tensor.py --output-root artifacts/beat-odds-tensor-audit --chunksize 128
      - name: Upload compact audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beat-odds-tensor-audit
          path: artifacts/beat-odds-tensor-audit/audit_report.json
          if-no-files-found: warn
