name: Experiment 015 Execution Stress

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/marketlab/execution_stress.py"
      - "src/marketlab/json_compat.py"
      - "scripts/experiment_015_execution_stress.py"
      - "scripts/run_experiment_015_execution_stress.py"
      - "tests/test_execution_stress.py"
      - "tests/test_json_compat.py"
      - "docs/EXPERIMENT_015_PROTOCOL.md"
      - ".github/workflows/experiment-015-execution-stress.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run focused execution engine tests
        run: pytest tests/test_execution_stress.py tests/test_json_compat.py -q
      - name: Run frozen historical execution stress
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-015
          python scripts/run_experiment_015_execution_stress.py \
            --output-root artifacts/experiment-015 \
            2>&1 | tee artifacts/experiment-015/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-015-execution-stress-${{ github.run_id }}
          path: |
            artifacts/experiment-015/result.json
            artifacts/experiment-015/failure.json
            artifacts/experiment-015/progress.json
            artifacts/experiment-015/run.log
            artifacts/experiment-015/scenario-summary.csv
            artifacts/experiment-015/scenario-ledgers/*.csv.gz
          retention-days: 90
          if-no-files-found: warn
