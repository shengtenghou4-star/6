name: Experiment 004 Independent Hazard

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_004_independent_hazard.py"
      - "docs/EXPERIMENT_004_PROTOCOL.md"
      - ".github/workflows/experiment-004-independent-hazard.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen independent replication
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-004
          python scripts/experiment_004_independent_hazard.py --output-root artifacts/experiment-004 2>&1 | tee artifacts/experiment-004/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-004-independent-hazard
          path: artifacts/experiment-004/
          if-no-files-found: warn

# Workflow trigger retained intentionally for independent replication.
