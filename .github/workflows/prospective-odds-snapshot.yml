name: Prospective Odds Snapshot

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Active The Odds API sport key; a free /v4/sports preflight runs before the odds request"
        required: true
        default: "soccer_epl"
        type: string
      regions:
        description: "Exactly one region when bookmakers is blank"
        required: false
        default: "uk"
        type: string
      bookmakers:
        description: "Optional comma-separated bookmaker keys; 1-10 and mutually exclusive with regions"
        required: false
        default: ""
        type: string
      markets:
        description: "Frozen first pilot market"
        required: true
        default: "h2h"
        type: string
      commence_time_from:
        description: "Optional ISO-8601 lower commence bound"
        required: false
        default: ""
        type: string
      commence_time_to:
        description: "Optional ISO-8601 upper commence bound"
        required: false
        default: ""
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Validate secret
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          if [[ -z "${THE_ODDS_API_KEY}" ]]; then
            echo "THE_ODDS_API_KEY repository secret is not configured; no request sent."
            exit 1
          fi
      - name: Validate frozen pilot inputs
        shell: bash
        env:
          REGIONS: ${{ inputs.regions }}
          BOOKMAKERS: ${{ inputs.bookmakers }}
          MARKETS: ${{ inputs.markets }}
        run: |
          set -euo pipefail
          if [[ "$MARKETS" != "h2h" ]]; then
            echo "First authenticated pilot is frozen to h2h only" >&2
            exit 2
          fi
          if [[ -n "$REGIONS" && -n "$BOOKMAKERS" ]]; then
            echo "Provide either one region or up to ten bookmakers, not both" >&2
            exit 2
          fi
          if [[ -z "$REGIONS" && -z "$BOOKMAKERS" ]]; then
            echo "One region or a named-bookmaker list is required" >&2
            exit 2
          fi
          if [[ -n "$REGIONS" && "$REGIONS" == *,* ]]; then
            echo "First authenticated pilot allows exactly one region" >&2
            exit 2
          fi
          if [[ -n "$BOOKMAKERS" ]]; then
            count=$(awk -F',' '{print NF}' <<< "$BOOKMAKERS")
            if (( count < 1 || count > 10 )); then
              echo "First authenticated pilot allows 1-10 named bookmakers" >&2
              exit 2
            fi
          fi
      - name: Collect one immutable snapshot
        shell: bash
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          SPORT: ${{ inputs.sport }}
          REGIONS: ${{ inputs.regions }}
          BOOKMAKERS: ${{ inputs.bookmakers }}
          MARKETS: ${{ inputs.markets }}
          COMMENCE_FROM: ${{ inputs.commence_time_from }}
          COMMENCE_TO: ${{ inputs.commence_time_to }}
        run: |
          set -euo pipefail
          args=(
            --sport "$SPORT"
            --markets "$MARKETS"
            --output-root artifacts/prospective-odds
          )
          if [[ -n "$BOOKMAKERS" ]]; then
            args+=(--bookmakers "$BOOKMAKERS")
          else
            args+=(--regions "$REGIONS")
          fi
          if [[ -n "$COMMENCE_FROM" ]]; then
            args+=(--commence-time-from "$COMMENCE_FROM")
          fi
          if [[ -n "$COMMENCE_TO" ]]; then
            args+=(--commence-time-to "$COMMENCE_TO")
          fi
          python scripts/collect_the_odds_api_snapshot.py "${args[@]}"
      - name: Audit authenticated pilot evidence
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          python scripts/audit_prospective_odds_pilot.py \
            --snapshot-root artifacts/prospective-odds \
            --output-root artifacts/prospective-pilot-audit
      - name: Upload immutable snapshot and audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prospective-odds-snapshot-${{ github.run_id }}
          path: |
            artifacts/prospective-odds/
            artifacts/prospective-pilot-audit/
          retention-days: 90
          if-no-files-found: warn

# Intentionally manual-only. Do not add a schedule until provider scope,
# credit budget and a persistent storage sink are frozen.
