name: Experiment 013 Selection Ranking Decomposition

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_013_selection_ranking_decomposition.py"
      - "docs/EXPERIMENT_013_PROTOCOL.md"
      - ".github/workflows/experiment-013-selection-ranking-decomposition.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen selection-ranking decomposition
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-013
          python scripts/experiment_013_selection_ranking_decomposition.py \
            --output-root artifacts/experiment-013 \
            2>&1 | tee artifacts/experiment-013/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-013-selection-ranking-decomposition
          path: |
            artifacts/experiment-013/result.json
            artifacts/experiment-013/failure.json
            artifacts/experiment-013/progress.json
            artifacts/experiment-013/run.log
            artifacts/experiment-013/identity_*.csv.gz
            artifacts/experiment-013/strategy_*.csv.gz
          if-no-files-found: warn
