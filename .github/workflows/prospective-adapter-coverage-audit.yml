name: Prospective Adapter Coverage Audit

on:
  workflow_run:
    workflows:
      - "Prospective Canonical Timing Shadow"
    types:
      - completed
    branches:
      - main
  schedule:
    - cron: "27 */3 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "src/marketlab/prospective_adapter_coverage.py"
      - "scripts/audit_prospective_adapter_coverage.py"
      - "tests/test_prospective_adapter_coverage.py"
      - ".github/workflows/prospective-adapter-coverage-audit.yml"

permissions:
  contents: write

concurrency:
  group: prospective-adapter-coverage-audit
  cancel-in-progress: false

env:
  COMMON_ACTIVATION_UTC: "2026-07-19T15:00:00Z"
  CAMPAIGN_END_UTC: "2026-07-26T06:30:00Z"

jobs:
  audit:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check audit window
        id: window
        shell: bash
        run: |
          python - <<'PY'
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          def parse(value):
              return datetime.fromisoformat(value.replace("Z", "+00:00")).astimezone(UTC)

          now = datetime.now(UTC)
          active = parse(os.environ["COMMON_ACTIVATION_UTC"]) <= now < parse(os.environ["CAMPAIGN_END_UTC"])
          if os.environ.get("GITHUB_EVENT_NAME") == "pull_request":
              active = True
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"active={'true' if active else 'false'}\n")
          PY

      - uses: actions/setup-python@v5
        if: steps.window.outputs.active == 'true'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        if: steps.window.outputs.active == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Validate audit logic on pull request
        if: steps.window.outputs.active == 'true' && github.event_name == 'pull_request'
        run: pytest -q tests/test_prospective_adapter_coverage.py

      - name: Check out cumulative prospective state
        if: steps.window.outputs.active == 'true' && github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: prospective-data
          path: prospective-data
          fetch-depth: 1

      - name: Check aligned stream readiness
        if: steps.window.outputs.active == 'true' && github.event_name != 'pull_request'
        id: ready
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("prospective-data/data/derived/latest")
          candidate_paths = [
              root / "shadow/event-shadow-candidates.csv.gz",
              root / "support-repaired-shadow/support-repaired-event-candidates.csv.gz",
              root / "canonical-timing-shadow/canonical-timing-event-candidates.csv.gz",
          ]
          manifest_paths = {
              "original": root / "shadow/manifest.json",
              "support": root / "support-repaired-shadow/manifest.json",
              "canonical": root / "canonical-timing-shadow/manifest.json",
          }
          missing = [str(path) for path in [*candidate_paths, *manifest_paths.values()] if not path.exists()]
          ready = not missing
          reason = None
          if ready:
              manifests = {name: json.loads(path.read_text()) for name, path in manifest_paths.items()}
              original_sha = manifests["original"]["outputs"]["per_book_scores"]["sha256"]
              support_sha = manifests["support"]["source"]["per_book_scores"]["sha256"]
              canonical_sha = manifests["canonical"]["source"]["per_book_scores"]["sha256"]
              ready = original_sha == support_sha == canonical_sha
              if not ready:
                  reason = {
                      "original": original_sha,
                      "support": support_sha,
                      "canonical": canonical_sha,
                  }
          else:
              reason = {"missing": missing}
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"ready={'true' if ready else 'false'}\n")
          print({"ready": ready, "reason": reason})
          PY

      - name: Run outcome-blind adapter coverage audit
        if: steps.ready.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/adapter-coverage-audit
          python scripts/audit_prospective_adapter_coverage.py \
            --original prospective-data/data/derived/latest/shadow/event-shadow-candidates.csv.gz \
            --support-repaired prospective-data/data/derived/latest/support-repaired-shadow/support-repaired-event-candidates.csv.gz \
            --canonical-timing prospective-data/data/derived/latest/canonical-timing-shadow/canonical-timing-event-candidates.csv.gz \
            --output-root artifacts/adapter-coverage-audit \
            --common-activation-utc "$COMMON_ACTIVATION_UTC"

      - name: Persist immutable coverage evidence
        if: steps.ready.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          run_target="prospective-data/data/adapter-coverage-audits/${GITHUB_RUN_ID}"
          latest_target="prospective-data/data/derived/latest/adapter-coverage-audit"
          if [[ -e "$run_target" ]]; then
            echo "Immutable audit target already exists: $run_target" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$run_target")" "$(dirname "$latest_target")"
          cp -a artifacts/adapter-coverage-audit "$run_target"
          rm -rf "$latest_target"
          cp -a artifacts/adapter-coverage-audit "$latest_target"
          cd prospective-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/adapter-coverage-audits data/derived/latest/adapter-coverage-audit
          git commit -m "Record adapter coverage audit ${GITHUB_RUN_ID}"
          for attempt in 1 2 3; do
            git pull --rebase origin prospective-data
            if git push origin HEAD:prospective-data; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "Unable to persist adapter coverage after three attempts" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Upload audit evidence
        if: always() && steps.ready.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prospective-adapter-coverage-audit-${{ github.run_id }}
          path: artifacts/adapter-coverage-audit/
          retention-days: 90
          if-no-files-found: warn

# This audit reads no closing targets or match outcomes and cannot modify the
# running streams or their frozen campaign-close evaluators. It runs only when
# all three candidate streams derive from the same original score ledger.
