name: Experiment 000 Bookmaker Deviation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_000_bookmaker_deviation.py"
      - "docs/EXPERIMENT_000_PROTOCOL.md"
      - ".github/workflows/experiment-000.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Acquire development data
        run: >-
          python scripts/backfill_football_data.py
          --data-root artifacts/experiment-000/development
          --seasons 1920 2021 2122 2223 2324
          --divisions E0 D1 I1 SP1 F1
          --min-rows 8000
      - name: Acquire locked external holdout
        run: >-
          python scripts/backfill_football_data.py
          --data-root artifacts/experiment-000/holdout
          --seasons 2425 2526
          --divisions N1 P1 B1 SC0
          --min-rows 1800
      - name: Run preregistered experiment
        run: >-
          python scripts/experiment_000_bookmaker_deviation.py
          --development artifacts/experiment-000/development/bronze/football_data_matches.csv.gz
          --holdout artifacts/experiment-000/holdout/bronze/football_data_matches.csv.gz
          --output artifacts/experiment-000/experiment_000_result.json
      - name: Upload complete evidence
        uses: actions/upload-artifact@v4
        with:
          name: experiment-000-evidence
          path: artifacts/experiment-000
          if-no-files-found: error
