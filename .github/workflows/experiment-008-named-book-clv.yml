name: Experiment 008 Named Book CLV

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_008_named_book_clv.py"
      - "docs/EXPERIMENT_008_PROTOCOL.md"
      - ".github/workflows/experiment-008-named-book-clv.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen named-book CLV proxy
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-008
          python scripts/experiment_008_named_book_clv.py \
            --output-root artifacts/experiment-008 \
            --chunksize 128 \
            --hazard-max-train 500000 \
            --movement-max-train 400000 \
            2>&1 | tee artifacts/experiment-008/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-008-named-book-clv
          path: |
            artifacts/experiment-008/result.json
            artifacts/experiment-008/failure.json
            artifacts/experiment-008/progress.json
            artifacts/experiment-008/run.log
            artifacts/experiment-008/baseline_strategy.csv.gz
            artifacts/experiment-008/augmented_strategy.csv.gz
          if-no-files-found: warn
