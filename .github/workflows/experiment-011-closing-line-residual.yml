name: Experiment 011 Closing Line Residual

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_011_closing_line_residual.py"
      - "docs/EXPERIMENT_011_PROTOCOL.md"
      - ".github/workflows/experiment-011-closing-line-residual.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen same-book closing-line test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-011
          python scripts/experiment_011_closing_line_residual.py \
            --output-root artifacts/experiment-011 \
            --chunksize 128 \
            --hazard-max-train 500000 \
            --movement-max-train 400000 \
            2>&1 | tee artifacts/experiment-011/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-011-closing-line-residual
          path: |
            artifacts/experiment-011/result.json
            artifacts/experiment-011/failure.json
            artifacts/experiment-011/progress.json
            artifacts/experiment-011/run.log
            artifacts/experiment-011/baseline_closing_strategy.csv.gz
            artifacts/experiment-011/augmented_closing_strategy.csv.gz
          if-no-files-found: warn
