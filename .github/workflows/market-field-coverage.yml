name: Market Field Coverage Atlas

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/profile_football_data_market_coverage.py"
      - ".github/workflows/market-field-coverage.yml"
      - "src/marketlab/availability.py"

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Rebuild full coarse archive
        run: >-
          python scripts/backfill_football_data_full_archive.py
          --output-root artifacts/source
          --min-rows 100000
      - name: Profile market-field coverage
        run: >-
          python scripts/profile_football_data_market_coverage.py
          --input artifacts/source/bronze/football_data_full_archive.csv.gz
          --output-root artifacts/market-field-coverage
      - name: Upload coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-field-coverage-atlas
          path: artifacts/market-field-coverage
          if-no-files-found: error
