name: Prospective Campaign Liveness

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/prospective-campaign-liveness.yml"
      - "src/marketlab/prospective_campaign_liveness.py"
      - "scripts/audit_prospective_campaign_liveness.py"
      - "tests/test_prospective_campaign_liveness.py"
      - "docs/PROSPECTIVE_CAMPAIGN_LIVENESS_AUDIT.md"
  schedule:
    - cron: "27 1-23/3 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/prospective-campaign-liveness.yml"
      - "src/marketlab/prospective_campaign_liveness.py"
      - "scripts/audit_prospective_campaign_liveness.py"
      - "tests/test_prospective_campaign_liveness.py"
      - "docs/PROSPECTIVE_CAMPAIGN_LIVENESS_AUDIT.md"

permissions:
  contents: write

concurrency:
  group: prospective-campaign-liveness
  cancel-in-progress: false

env:
  CAMPAIGN_START_UTC: "2026-07-19T06:00:00Z"
  CAMPAIGN_END_UTC: "2026-07-26T06:30:00Z"
  STALE_AFTER_HOURS: "4.5"

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q tests/test_prospective_campaign_liveness.py

      - name: Check out persistent prospective state
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: prospective-data
          path: prospective-data
          fetch-depth: 1

      - name: Audit current campaign state
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/campaign-liveness
          python scripts/audit_prospective_campaign_liveness.py \
            --sequence-manifest prospective-data/data/derived/latest/sequence/manifest.json \
            --shadow-manifest prospective-data/data/derived/latest/shadow/manifest.json \
            --support-repaired-manifest prospective-data/data/derived/latest/support-repaired-shadow/manifest.json \
            --canonical-timing-manifest prospective-data/data/derived/latest/canonical-timing-shadow/manifest.json \
            --output-root artifacts/campaign-liveness \
            --campaign-start-utc "$CAMPAIGN_START_UTC" \
            --campaign-end-utc "$CAMPAIGN_END_UTC" \
            --stale-after-hours "$STALE_AFTER_HOURS"

      - name: Persist immutable liveness evidence
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          run_target="prospective-data/data/liveness-audits/${GITHUB_RUN_ID}"
          latest_target="prospective-data/data/derived/latest/campaign-liveness"
          if [[ -e "$run_target" ]]; then
            echo "Immutable liveness target already exists: $run_target" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$run_target")" "$(dirname "$latest_target")"
          cp -a artifacts/campaign-liveness "$run_target"
          rm -rf "$latest_target"
          cp -a artifacts/campaign-liveness "$latest_target"
          cd prospective-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/liveness-audits data/derived/latest/campaign-liveness
          git commit -m "Record campaign liveness audit ${GITHUB_RUN_ID}"
          for attempt in 1 2 3; do
            git pull --rebase origin prospective-data
            if git push origin HEAD:prospective-data; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "Unable to persist liveness audit after three attempts" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Upload liveness evidence
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: prospective-campaign-liveness-${{ github.run_id }}
          path: artifacts/campaign-liveness/
          retention-days: 90
          if-no-files-found: warn

      - name: Fail visibly on unhealthy campaign state
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          status=$(tr -d '\r\n' < artifacts/campaign-liveness/status.txt)
          if [[ "$status" != "healthy" ]]; then
            echo "Prospective campaign liveness status: $status" >&2
            cat artifacts/campaign-liveness/result.json >&2
            exit 1
          fi

# This workflow makes no paid provider request and reads no outcome or closing
# performance fields. It only checks freshness and immutable-state alignment.
