name: Experiment 009 Frozen Return Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_009_frozen_return_audit.py"
      - "docs/EXPERIMENT_009_PROTOCOL.md"
      - ".github/workflows/experiment-009-frozen-return-audit.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen realized-return audit
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-009
          python scripts/experiment_009_frozen_return_audit.py \
            --output-root artifacts/experiment-009 \
            --chunksize 128 \
            --hazard-max-train 500000 \
            --movement-max-train 400000 \
            2>&1 | tee artifacts/experiment-009/run.log
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-009-frozen-return-audit
          path: |
            artifacts/experiment-009/result.json
            artifacts/experiment-009/failure.json
            artifacts/experiment-009/progress.json
            artifacts/experiment-009/run.log
            artifacts/experiment-009/baseline_settled.csv.gz
            artifacts/experiment-009/augmented_settled.csv.gz
          if-no-files-found: warn
