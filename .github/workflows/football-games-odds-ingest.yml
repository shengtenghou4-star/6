name: Football Games Odds Ingest

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/backfill_football_games_odds.py"
      - ".github/workflows/football-games-odds-ingest.yml"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e .
      - name: Acquire and profile independent odds-change dataset
        run: python scripts/backfill_football_games_odds.py --output-root artifacts/football-games-odds
      - name: Upload compact evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: football-games-odds-evidence
          path: |
            artifacts/football-games-odds/manifest.json
            artifacts/football-games-odds/failure.json
          if-no-files-found: warn
