name: Unpack Phase 43 Source Bundle

on:
  push:
    branches:
      - phase-43-prospective-cohort-evaluation
    paths:
      - phase43_bundle.tar.gz
      - .github/workflows/unpack-phase43.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: unpack-phase-43-source-bundle
  cancel-in-progress: false

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-43-prospective-cohort-evaluation
          fetch-depth: 1

      - name: Verify and stage non-workflow Phase 43 sources
        shell: bash
        run: |
          set -euo pipefail
          echo "13acd41d692aa5252c0ffdeb812fc67cdcff98d514192f65ee80613909a6c455  phase43_bundle.tar.gz" | sha256sum -c -
          tmp=$(mktemp -d)
          tar -xzf phase43_bundle.tar.gz -C "$tmp"
          install -D "$tmp/src/marketlab/prospective_matched_budget_evaluation.py" src/marketlab/prospective_matched_budget_evaluation.py
          install -D "$tmp/tests/test_prospective_matched_budget_evaluation.py" tests/test_prospective_matched_budget_evaluation.py
          install -D "$tmp/scripts/evaluate_prospective_matched_budget_cohort.py" scripts/evaluate_prospective_matched_budget_cohort.py
          install -D "$tmp/docs/PROSPECTIVE_MATCHED_BUDGET_COHORT_EVALUATION.md" docs/PROSPECTIVE_MATCHED_BUDGET_COHORT_EVALUATION.md

      - name: Commit materialized non-workflow sources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/marketlab/prospective_matched_budget_evaluation.py \
                  tests/test_prospective_matched_budget_evaluation.py \
                  scripts/evaluate_prospective_matched_budget_cohort.py \
                  docs/PROSPECTIVE_MATCHED_BUDGET_COHORT_EVALUATION.md
          if git diff --cached --quiet; then
            echo "Phase 43 non-workflow sources already materialized"
            exit 0
          fi
          git commit -m "Materialize Phase 43 cohort evaluator sources"
          git push origin HEAD:phase-43-prospective-cohort-evaluation
