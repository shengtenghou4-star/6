name: Experiment 005 Residual Outcome Information

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/generate_abnormal_action_residuals.py"
      - "scripts/experiment_005_residual_outcome_info.py"
      - "docs/EXPERIMENT_005_PROTOCOL.md"
      - ".github/workflows/experiment-005-residual-outcome-info.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Regenerate frozen outcome-blind residuals
        run: >-
          python scripts/generate_abnormal_action_residuals.py
          --output-root artifacts/abnormal-action-residuals
          --chunksize 128
          --hazard-max-train 500000
          --movement-max-train 400000
      - name: Run preregistered incremental outcome-information test
        run: >-
          python scripts/experiment_005_residual_outcome_info.py
          --residual-root artifacts/abnormal-action-residuals
          --output-root artifacts/experiment-005
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-005-residual-outcome-information
          path: |
            artifacts/experiment-005/result.json
            artifacts/abnormal-action-residuals/manifest.json
          if-no-files-found: warn
