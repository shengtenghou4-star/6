name: Experiment 012 Residual Attribution Null

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_012_residual_attribution_null.py"
      - "docs/EXPERIMENT_012_PROTOCOL.md"
      - ".github/workflows/experiment-012-residual-attribution-null.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen residual attribution audit
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-012
          python scripts/experiment_012_residual_attribution_null.py \
            --output-root artifacts/experiment-012 \
            2>&1 | tee artifacts/experiment-012/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-012-residual-attribution-null
          path: |
            artifacts/experiment-012/result.json
            artifacts/experiment-012/failure.json
            artifacts/experiment-012/progress.json
            artifacts/experiment-012/run.log
            artifacts/experiment-012/variant_summary.csv
            artifacts/experiment-012/strategy_*.csv.gz
          if-no-files-found: warn
