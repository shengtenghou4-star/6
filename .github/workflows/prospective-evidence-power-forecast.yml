name: Prospective Evidence Power Forecast

on:
  schedule:
    - cron: "27 */6 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/forecast_prospective_evidence_power.py"
      - "docs/PROSPECTIVE_EVIDENCE_POWER_FORECAST.md"
      - ".github/workflows/prospective-evidence-power-forecast.yml"

permissions:
  contents: write

concurrency:
  group: prospective-evidence-power-forecast
  cancel-in-progress: false

env:
  FORECAST_START_UTC: "2026-07-19T11:00:00Z"
  FORECAST_END_UTC: "2026-07-26T06:30:00Z"

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check forecast window
        id: window
        shell: bash
        run: |
          python - <<'PY'
          import os
          from datetime import UTC, datetime
          from pathlib import Path
          def parse(value):
              return datetime.fromisoformat(value.replace("Z", "+00:00")).astimezone(UTC)
          now = datetime.now(UTC)
          active = parse(os.environ["FORECAST_START_UTC"]) <= now < parse(os.environ["FORECAST_END_UTC"])
          # PR runs are always allowed for validation.
          if os.environ.get("GITHUB_EVENT_NAME") == "pull_request":
              active = True
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
              fh.write(f"active={'true' if active else 'false'}\n")
          print({"now": now.isoformat(), "active": active})
          PY

      - name: Check out cumulative prospective state
        if: steps.window.outputs.active == 'true'
        uses: actions/checkout@v4
        with:
          ref: prospective-data
          path: prospective-data
          fetch-depth: 1

      - uses: actions/setup-python@v5
        if: steps.window.outputs.active == 'true'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        if: steps.window.outputs.active == 'true'
        run: python -m pip install -e .

      - name: Run outcome-blind evidence forecast
        if: steps.window.outputs.active == 'true'
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/evidence-power-forecast
          python scripts/forecast_prospective_evidence_power.py \
            --candidates prospective-data/data/derived/latest/shadow/event-shadow-candidates.csv.gz \
            --output-root artifacts/evidence-power-forecast \
            --simulations 20000 \
            --seed 20260719 \
            2>&1 | tee artifacts/evidence-power-forecast/run.log

      - name: Persist immutable scheduled forecast
        if: steps.window.outputs.active == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          target="prospective-data/data/forecasts/evidence-power/${GITHUB_RUN_ID}"
          if [[ -e "$target" ]]; then
            echo "Forecast target already exists: $target" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$target")"
          cp -a artifacts/evidence-power-forecast "$target"
          cd prospective-data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "data/forecasts/evidence-power/${GITHUB_RUN_ID}"
          git commit -m "Record prospective evidence forecast ${GITHUB_RUN_ID}"
          git push origin HEAD:prospective-data

      - name: Upload forecast evidence
        if: always() && steps.window.outputs.active == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prospective-evidence-power-${{ github.run_id }}
          path: artifacts/evidence-power-forecast/
          retention-days: 90
          if-no-files-found: warn

# The schedule is inert outside the frozen campaign window. Forecasts are
# outcome-blind and may not change the running policy or final evidence gates.
