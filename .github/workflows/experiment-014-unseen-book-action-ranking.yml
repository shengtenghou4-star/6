name: Experiment 014 Unseen Book Action Ranking

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_014_unseen_book_action_ranking.py"
      - "docs/EXPERIMENT_014_PROTOCOL.md"
      - ".github/workflows/experiment-014-unseen-book-action-ranking.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen unseen-book action-ranking audit
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-014
          python scripts/experiment_014_unseen_book_action_ranking.py \
            --output-root artifacts/experiment-014 \
            2>&1 | tee artifacts/experiment-014/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-014-unseen-book-action-ranking
          path: |
            artifacts/experiment-014/result.json
            artifacts/experiment-014/failure.json
            artifacts/experiment-014/progress.json
            artifacts/experiment-014/run.log
            artifacts/experiment-014/out_of_book_predictions.csv.gz
            artifacts/experiment-014/strategy_*.csv.gz
          if-no-files-found: warn
