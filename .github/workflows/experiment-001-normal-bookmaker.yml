name: Experiment 001 Normal Bookmaker

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_001_normal_bookmaker.py"
      - "docs/EXPERIMENT_001_PROTOCOL.md"
      - ".github/workflows/experiment-001-normal-bookmaker.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen Experiment 001
        run: >-
          python scripts/experiment_001_normal_bookmaker.py
          --output-root artifacts/experiment-001
          --chunksize 128
          --nonlinear-max-train 400000
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-001-normal-bookmaker
          path: artifacts/experiment-001/result.json
          if-no-files-found: warn
