name: Experiment 025 CLV Return Bridge

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/marketlab/clv_return_bridge.py"
      - "scripts/experiment_025_clv_return_bridge.py"
      - "tests/test_clv_return_bridge.py"
      - "docs/EXPERIMENT_025_PROTOCOL.md"
      - "docs/EXPERIMENT_025_RESULT.md"
      - ".github/workflows/experiment-025-clv-return-bridge.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q tests/test_clv_return_bridge.py
      - name: Run CLV-return bridge
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-025
          python scripts/experiment_025_clv_return_bridge.py \
            --output-root artifacts/experiment-025 \
            --bootstrap-replicates 1000 \
            2>&1 | tee artifacts/experiment-025/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-025-clv-return-bridge-${{ github.run_id }}
          path: |
            artifacts/experiment-025/result.json
            artifacts/experiment-025/failure.json
            artifacts/experiment-025/progress.json
            artifacts/experiment-025/run.log
            artifacts/experiment-025/clv-return-bridge-by-outcome.csv
            artifacts/experiment-025/execution-prices.csv.gz
            artifacts/experiment-025/*-policy-before-outcomes.csv.gz
          retention-days: 90
          if-no-files-found: warn
