name: Public Source Sample

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "scripts/bootstrap_public_samples.py"
      - ".github/workflows/public-sample.yml"

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Fetch public samples
        run: python scripts/bootstrap_public_samples.py --data-root artifacts/public-sample --season 2526 --division E0
      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-source-sample
          path: artifacts/public-sample
          if-no-files-found: error
