name: Experiment 010 Modern AH Residual Repricing

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_010_modern_ah_residual_repricing.py"
      - "scripts/run_experiment_010_modern_ah.py"
      - "docs/EXPERIMENT_010_PROTOCOL.md"
      - ".github/workflows/experiment-010-modern-ah-residual-repricing.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen modern AH residual repricing test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-010
          python scripts/run_experiment_010_modern_ah.py \
            --output-root artifacts/experiment-010 \
            2>&1 | tee artifacts/experiment-010/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-010-modern-ah-residual-repricing
          path: |
            artifacts/experiment-010/result.json
            artifacts/experiment-010/failure.json
            artifacts/experiment-010/progress.json
            artifacts/experiment-010/run.log
            artifacts/experiment-010/validation_residuals.csv.gz
            artifacts/experiment-010/test_residuals.csv.gz
          if-no-files-found: warn
