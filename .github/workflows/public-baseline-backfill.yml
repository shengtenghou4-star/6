name: Public Baseline Backfill

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/backfill_football_data.py"
      - ".github/workflows/public-baseline-backfill.yml"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Backfill Big-5 baseline
        run: python scripts/backfill_football_data.py --data-root artifacts/football-data-baseline --min-rows 15000
      - name: Upload baseline lake artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-data-baseline
          path: artifacts/football-data-baseline
          if-no-files-found: error
