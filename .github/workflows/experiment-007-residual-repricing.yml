name: Experiment 007 Residual Repricing

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/experiment_006_independent_residual_outcome.py"
      - "scripts/experiment_007_residual_repricing.py"
      - "docs/EXPERIMENT_007_PROTOCOL.md"
      - ".github/workflows/experiment-007-residual-repricing.yml"

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e . pandas numpy scikit-learn
      - name: Run frozen residual repricing test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/experiment-007
          python scripts/experiment_007_residual_repricing.py \
            --output-root artifacts/experiment-007 \
            2>&1 | tee artifacts/experiment-007/run.log
      - name: Upload result evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-007-residual-repricing
          path: artifacts/experiment-007/
          if-no-files-found: warn
