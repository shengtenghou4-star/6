name: Public Odds Multi-League Samples

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/marketlab/sources/the_odds_api.py"
      - "scripts/sample_public_odds_examples.py"
      - ".github/workflows/public-odds-multi-league.yml"

jobs:
  sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e .
      - run: python scripts/sample_public_odds_examples.py --output-root artifacts/public-odds-samples
      - uses: actions/upload-artifact@v4
        with:
          name: public-odds-multi-league-samples
          path: artifacts/public-odds-samples
          if-no-files-found: error
