name: Entity Spine v0

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/build_entity_spine.py"
      - ".github/workflows/entity-spine-v0.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Rebuild source archive
        run: >-
          python scripts/backfill_football_data_full_archive.py
          --output-root artifacts/entity-spine/source
          --min-rows 100000
      - name: Build deterministic source-level entity spine
        run: >-
          python scripts/build_entity_spine.py
          --input artifacts/entity-spine/source/bronze/football_data_full_archive.csv.gz
          --output-root artifacts/entity-spine/silver
      - name: Upload entity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entity-spine-v0
          path: artifacts/entity-spine
          if-no-files-found: warn
